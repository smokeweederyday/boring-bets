<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Baseball stadium placeholder</title>
  <desc id="desc">A dark retro-styled baseball stadium used until a venue photograph is available.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17283b"/>
      <stop offset="0.58" stop-color="#0b1522"/>
      <stop offset="1" stop-color="#030810"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="90%" r="78%">
      <stop offset="0" stop-color="#237143"/>
      <stop offset="0.58" stop-color="#123d2a"/>
      <stop offset="1" stop-color="#071711"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <path d="M0 235 Q600 75 1200 235 V505 H0Z" fill="#07101a" stroke="#264766" stroke-width="4"/>
  <g fill="#162b3f" stroke="#355d7e" stroke-width="3">
