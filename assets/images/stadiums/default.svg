  <path d="M155 675 Q600 285 1045 675Z" fill="url(#field)"/>
  <path d="M478 675 L600 420 L722 675Z" fill="#a97843" opacity="0.88"/>
  <path d="M600 420 L639 478 L600 535 L561 478Z" fill="#d6c09d"/>
  <g fill="#dff8ff" filter="url(#glow)">
    <circle cx="160" cy="178" r="12"/><circle cx="235" cy="148" r="12"/><circle cx="965" cy="148" r="12"/><circle cx="1040" cy="178" r="12"/>
  </g>
  <g stroke="#39d7df" stroke-width="4" opacity="0.55">
    <path d="M118 510 H1082"/><path d="M230 570 H970"/>
  </g>
  <text x="600" y="325" text-anchor="middle" fill="#eaf7ff" font-family="Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="8">BALLPARK</text>
  <text x="600" y="366" text-anchor="middle" fill="#58dce1" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="5">VENUE PHOTO PENDING</text>
