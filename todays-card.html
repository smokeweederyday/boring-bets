<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Today’s Boring Bets card with odds, units, analysis, and handicappers."
  >
  <title>Today’s Card | Boring Bets</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="card-page">

  <header class="site-header">
    <a class="brand" href="index.html">BORING BETS</a>

    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="todays-card.html" aria-current="page">Today’s Card</a>
      <a href="index.html#results">Results</a>
      <a href="index.html#articles">Articles</a>
      <a href="index.html#tools">Tools</a>
      <a href="index.html#discord">Discord</a>
    </nav>
  </header>

  <main class="card-main">

    <section class="card-hero">
      <p class="eyebrow">DAILY PLAYS</p>
      <h1>Today’s Card</h1>

      <div class="card-meta">
        <span id="cardDate">Loading date…</span>
        <span id="cardUpdated">Loading update time…</span>
      </div>
    </section>

    <section class="card-summary">
      <div>
        <span>Total Plays</span>
        <strong id="totalPlays">—</strong>
      </div>

      <div>
        <span>Total Units</span>
        <strong id="totalUnits">—</strong>
      </div>

      <div>
        <span>Sports</span>
        <strong id="totalSports">—</strong>
      </div>
    </section>

    <section>
      <div id="cardStatus" class="card-message">
        Loading today’s card…
      </div>

      <div id="playsContainer"></div>
    </section>

  </main>

  <footer class="site-footer">
    <strong>Boring Bets</strong>
    <span>Data over hype.</span>
  </footer>

  <script src="todays-card.js"></script>
</body>
</html>
